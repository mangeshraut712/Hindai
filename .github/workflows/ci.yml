name: CI Pipeline

# Hind AI — Gemma 4 Hackathon Project
# CI does not boot Ollama; tests are isolated from local model dependencies.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ==========================================
  # Quality Checks
  # ==========================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Prettier check
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  # ==========================================
  # Unit & Integration Tests
  # ==========================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm run test

  # ==========================================
  # Production Build
  # ==========================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next/
          retention-days: 7

  # ==========================================
  # E2E Tests (runs on main branch only)
  # ==========================================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # ==========================================
  # Deploy (Vercel GitHub Integration handles this automatically)
  # ==========================================
  # Note: Connect your repo to Vercel for auto-deployment on push to main
  # No secrets needed — Vercel handles deployment via GitHub App
  #
  # Required Vercel Environment Variables:
  #   GEMINI_API_KEY        — Google Generative Language API key (for hosted Gemma)
  #   GEMMA_MODEL           — Model ID, e.g. "gemma-4-31b-it" or "gemma-4-26b-a4b-it"
  #   OLLAMA_API_KEY        — API key for cloud Ollama (if using)
  #   KAGGLE_API_TOKEN      — Kaggle API token (for model access)
  #   OLLAMA_CLOUD_URL      — (Optional) Cloud Ollama endpoint URL
  #   UPSTASH_REDIS_REST_URL    — (Optional) Redis for caching
  #   UPSTASH_REDIS_REST_TOKEN  — (Optional) Redis token
