name: CI Pipeline

# Note: Tests requiring API keys are skipped by default.
# For local testing: export GEMINI_API_KEY="your_key" && npm run test
# GitHub Secrets (optional, for CI): GEMINI_API_KEY, UPSTASH_REDIS_REST_URL, UPSTASH_REDIS_REST_TOKEN

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'

jobs:
  # ==========================================
  # Quality Checks
  # ==========================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Prettier check
        run: npm run format -- --check

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  # ==========================================
  # Unit & Integration Tests
  # ==========================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests (without API dependencies)
        run: npm run test:coverage -- --exclude="**/gemini.test.ts"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ==========================================
  # Production Build
  # ==========================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next/
          retention-days: 7

  # ==========================================
  # Deploy (Vercel GitHub Integration handles this automatically)
  # ==========================================
  # Note: Connect your repo to Vercel for auto-deployment on push to main
  # No secrets needed - Vercel handles deployment via GitHub App
